name: Cache stat cards

on:
  schedule:
    - cron: '23 4 * * *'   # daily, off the top of the hour (cron is delayed under load)
  workflow_dispatch:

permissions:
  contents: write          # default GITHUB_TOKEN is read-only; needed to push

concurrency:
  group: cache-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5   # node24 baseline; persists token so `git push` just works

      - name: Fetch rendered cards
        run: |
          set -euo pipefail
          mkdir -p images
          base="https://github-readme-stats.vercel.app"

          fetch_card() {
            url="$1"; out="$2"
            for attempt in 1 2 3; do
              tmp="$(mktemp)"
              if curl -fSsL --retry 3 --retry-delay 5 --retry-all-errors "$url" -o "$tmp" \
                 && [ "$(wc -c < "$tmp")" -ge 500 ] \
                 && grep -q '<svg' "$tmp" \
                 && ! grep -qiE 'Something went wrong|Maximum retries exceeded|invalid username|could not fetch' "$tmp"; then
                mv "$tmp" "$out"
                echo "Fetched $out (attempt $attempt)"
                return 0
              fi
              rm -f "$tmp"
              echo "::warning::$out: bad or error response (attempt $attempt)"
              if [ "$attempt" -lt 3 ]; then sleep 15; fi
            done
            # Couldn't get a clean card. If we already have one committed, keep it
            # (the README keeps showing last-good) and let the run succeed.
            if [ -f "$out" ]; then
              echo "::warning::$out: could not refresh after 3 attempts - keeping last committed card"
              return 0
            fi
            echo "::error::$out: could not fetch and no existing card to fall back on"
            return 1
          }

          fetch_card \
            "$base/api?username=mzuhairkhan&show_icons=true&theme=radical" \
            images/stats.svg
          fetch_card \
            "$base/api/top-langs/?username=mzuhairkhan&theme=radical&layout=compact&hide=jupyter%20notebook,swig,dart" \
            images/top-langs.svg


      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add images/stats.svg images/top-langs.svg
          if git diff --cached --quiet; then
            echo "No changes; nothing to commit."
          else
            git commit -m 'chore: refresh GitHub stat cards'
            git push
          fi
